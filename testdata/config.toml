[[projects]]
name = "Zpit"
id = "zpit"
profile = "terminal"
hook_mode = "relaxed"
tracker = "github-personal"
tracker_project = "zpit"
git = "github"
repo = "zac15987/zpit"
shared_core = false
log_policy = "standard"
base_branch = "dev"
auto_merge = true
merge_method = "squash"
channel_enabled = true
# channel_listen: subscribe to other projects' SSE streams for cross-project communication.
# "_global" receives global broadcasts; specific project IDs (e.g. "ase-inspection") receive that project's events.
# Targeted cross-project messaging (send_message with target_project) works without this — only needed for
# receiving broadcasts or passively monitoring another project's channel.
channel_listen = ["_global"]
tags = ["go", "bubbletea"]

[projects.path]
windows = "D:/Documents/MyProjects/zpit"
wsl = "/mnt/d/Documents/MyProjects/zpit"

