# ~/.config/zpit/config.toml

[terminal]
windows_mode = "new_tab"
tmux_mode = "new_window"

[notification]
tui_alert = true
windows_toast = true
sound = true
re_remind_minutes = 15

[worktree]
base_dir_windows = "D:/Documents/.worktrees"
base_dir_wsl = "/mnt/d/Documents/.worktrees"
dir_format = "{project_id}/{issue_id}--{slug}"
auto_cleanup = true
max_per_project = 5

[providers.tracker.forgejo-leyu]
type = "forgejo_issues"
url = "http://leyu88.synology.me:3000"

mcp_server = "gitea"

[providers.tracker.github-personal]
type = "github_issues"
mcp_server = "github"

[providers.git.forgejo-leyu]
type = "forgejo"
url = "http://leyu88.synology.me:3000"

mcp_server = "gitea"

[providers.git.github]
type = "github"

mcp_server = "github"

# ──────────────────────────────────────────────
# Projects
# ──────────────────────────────────────────────

[[projects]]
name = "AI 檢測清潔機台 Demo"
id = "ai-inspection-cleaning"
profile = "machine"
hook_mode = "strict"
tracker = "forgejo-leyu"
tracker_project = "AI_Inspection_Cleaning_Demo"
git = "forgejo-leyu"
repo = "Leyu-LGBT/AI_Inspection_Cleaning_Demo"
shared_core = true
log_level = "strict"
tags = ["wpf", "ethercat", "basler"]

[projects.path]
windows = "D:/Documents/LeYu/Workspace/AI_Inspection_Cleaning_Demo"
wsl = "/mnt/d/Documents/LeYu/Workspace/AI_Inspection_Cleaning_Demo"

