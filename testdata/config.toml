# ~/.zpit/config.toml
language = "zh-TW"

# Cross-agent channel broker port (default 17731).
broker_port = 17731

# Explicit path to zpit executable for .mcp.json generation.
# Useful when running via "go run ." where the temp binary path becomes invalid.
# zpit_bin = "D:/path/to/zpit.exe"

[terminal]
windows_mode = "new_tab"
tmux_mode = "new_window"
windows_terminal_profile = "PowerShell 7"
# windows_terminal_profile = "PowerShell 7"  # WT profile name for -p flag and auto shell detection

[ssh]
port = 2200
host = "0.0.0.0"
host_key_path = "~/.zpit/ssh/host_ed25519"
authorized_keys_path = "~/.ssh/authorized_keys"
auto_serve = true
# password_env = "ZPIT_SSH_PASSWORD"   # env var name; leave commented to disable password auth

[notification]
tui_alert = true
windows_toast = true
sound = true
# sound_file = 'C:\Users\Jeff\Music\zelda-navi-listen.mp3'
re_remind_minutes = 2

[worktree]
base_dir_windows = "D:/Documents/.worktrees"
base_dir_wsl = "/mnt/d/Documents/.worktrees"
dir_format = "{project_id}/{issue_id}--{slug}"
auto_cleanup = true
max_per_project = 5
poll_seconds = 10
pr_poll_seconds = 10

# Per-role model selection — passed to Claude Code via --model at launch.
# Aliases (opus/sonnet/haiku) resolve per provider; [1m] enables the 1M-context tier.
# Pin to a full ID (e.g. claude-opus-4-7[1m]) if you need cross-provider consistency.
[agent_models]
clarifier = "opus[1m]"
coding = "opus[1m]"
reviewer = "opus[1m]"
task_runner = "opus[1m]"
efficiency = "opus[1m]"

[providers.tracker.forgejo-leyu]
type = "forgejo_issues"
url = "http://leyu88.synology.me:3000"
token_env = "FORGEJO_TOKEN"

[providers.tracker.github-personal]
type = "github_issues"
token_env = "GITHUB_TOKEN"

[providers.git.forgejo-leyu]
type = "forgejo"
url = "http://leyu88.synology.me:3000"
token_env = "FORGEJO_TOKEN"

[providers.git.github]
type = "github"
token_env = "GITHUB_TOKEN"

